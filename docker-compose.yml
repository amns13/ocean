services:
  db:
    image: postgres:18.2
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5433:5432
    env_file:
      - ./backend/.env_db

  backend:
    build:
      context: ./backend
    command: gunicorn ocean.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/home/app/web/staticfiles
    ports:
      - 8000:8000
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - vue_dist:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"       # ← only exposed internally; NPM proxies to this
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - vue_dist:/usr/share/nginx/html
      - static_volume:/home/app/web/staticfiles
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume:
  vue_dist:
