# This is the sample docker-compose. Modify as per your requirements.
services:
  ocean-db:
    image: postgres:18.2
    container_name: ocean-db
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5433:5432
    env_file:
      - ./backend/.env_db

  ocean-api:
    container_name: ocean-backend
    build:
      context: ./backend
    command: gunicorn ocean.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/home/app/backend/staticfiles
    ports:
      - 8000:8000
    env_file:
      - ./backend/.env
    depends_on:
      - ocean-db

  ocean-ui:
    container_name: ocean-frontend
    build: ./frontend
    env_file:
      - ./frontend/.env
    volumes:
      - vue_dist:/usr/share/nginx/html

  ocean-nginx:
    container_name: ocean-nginx
    image: nginx:alpine
    restart: always
    ports:
      - 8088:8088
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - vue_dist:/usr/share/nginx/html
      - static_volume:/home/app/backend/staticfiles
    depends_on:
      - ocean-backend
      - ocean-frontend

volumes:
  postgres_data:
  static_volume:
  vue_dist:
