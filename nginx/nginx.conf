server {
    listen 80;

    # ── Vue.js Frontend ───────────────────────────────────────────────────────
    # Serve the built Vue app for all non-API routes.
    # try_files is crucial for Vue Router — without it, refreshing on any route
    # other than "/" will return a 404.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Django REST API ───────────────────────────────────────────────────────
    # Forward all /api/ requests to Gunicorn inside the backend container.
    # The container name "backend" resolves via Docker's internal DNS.
    location /api/ {
        proxy_pass http://backend:8000;

        # Pass real client info through to Django
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout tuning — increase if you have long-running API calls
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Django Admin ──────────────────────────────────────────────────────────
    # Proxy /admin/ separately so Django's admin panel works correctly.
    location /admin/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django Static Files ───────────────────────────────────────────────────
    # Served from the shared Docker volume populated by collectstatic.
    location /static/ {
        alias /vol/static/;

        # Cache static assets aggressively — Django's ManifestStaticFilesStorage
        # busts the cache via content-hashed filenames anyway.
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── User-Uploaded Media Files ─────────────────────────────────────────────
    location /media/ {
        alias /vol/media/;

        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Security Headers ──────────────────────────────────────────────────────
    # NPM handles TLS, but these headers are still applied at the app level.
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin"   always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Hide Nginx version from response headers ───────────────────────────────
    server_tokens off;
}
